<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Meal Planner</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="./js/logic.js"></script>
    <script defer src="./js/meal.js"></script>
    <script defer src="./js/weather.js"></script>
    <script defer src="./js/app.js"></script>
</head>
<body>

    <!-- Search for your given location -->
    <section id = "search">
        <input type="text" id="location-input" placeholder="Enter a Location">
        <button id="search-btn">Search</button>
        <div id="unit-toggle">
            <label>
                <input type="radio" name="unit" value="celsius" checked>°C
            </label>
            <label>
                <input type="radio" name="unit" value="Fahrenheit" checked>°F
            </label>
        </div>
    </section>


</body>
</html>
